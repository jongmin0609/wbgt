services:
  - type: web
    name: wgbt-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run cloud_app.py --server.address=0.0.0.0 --server.port=$PORT --server.headless=true
    envVars:
      - key: WGBT_DATA_DIR
        value: /tmp/wgbt-data
      - key: PYTHON_VERSION
        value: 3.12.13
