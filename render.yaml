services:
  - type: web
    name: wgbt-dashboard
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run main.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: WGBT_DATA_DIR
        value: /tmp/wgbt-data
      - key: PYTHON_VERSION
        value: 3.12.13
